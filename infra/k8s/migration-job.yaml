apiVersion: batch/v1
kind: Job
metadata:
  name: bloodsugar-migrate
  namespace: bloodsugar
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bloodsugar
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      serviceAccountName: bloodsugar-backend
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: registry.example.com/bloodsugar/backend:replace-me
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: bloodsugar-config
            - secretRef:
                name: bloodsugar-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
