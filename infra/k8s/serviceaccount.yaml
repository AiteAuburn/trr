apiVersion: v1
kind: ServiceAccount
metadata:
  name: bloodsugar-backend
  namespace: bloodsugar
  annotations:
    # GKE Workload Identity example:
    # iam.gke.io/gcp-service-account: bloodsugar-api@PROJECT_ID.iam.gserviceaccount.com
    # EKS IRSA example:
    # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/bloodsugar-api
    bloodsugar.local/least-privilege-note: "grant only secret read and managed database connect permissions"
