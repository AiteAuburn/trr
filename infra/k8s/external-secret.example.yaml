apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: bloodsugar-secrets
  namespace: bloodsugar
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cloud-secret-store
    kind: ClusterSecretStore
  target:
    name: bloodsugar-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: bloodsugar/database-url
    - secretKey: REDIS_URL
      remoteRef:
        key: bloodsugar/redis-url
    - secretKey: AUTH_JWT_SECRET
      remoteRef:
        key: bloodsugar/auth-jwt-secret
