apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bloodsugar-default-deny-ingress
  namespace: bloodsugar
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bloodsugar-allow-ingress-to-app
  namespace: bloodsugar
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values: ["backend", "web"]
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 8080
