apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bloodsugar
  namespace: bloodsugar
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rps: "10"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.example.com
      secretName: bloodsugar-tls
  rules:
    - host: app.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: bloodsugar-backend
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bloodsugar-web
                port:
                  name: http
