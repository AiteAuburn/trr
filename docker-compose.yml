services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bloodsugar}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-bloodsugar}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      ENABLE_DEBUG_TOOLS: ${ENABLE_DEBUG_TOOLS:-false}
      ALLOW_DEV_AUTH: ${ALLOW_DEV_AUTH:-true}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://app:app@db:5432/bloodsugar}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      MAX_REQUEST_BODY_BYTES: ${MAX_REQUEST_BODY_BYTES:-1048576}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-}
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-}
      AUTH_JWT_AUDIENCE: ${AUTH_JWT_AUDIENCE:-}
      AUTH_JWKS_URL: ${AUTH_JWKS_URL:-}
      AUTH_JWKS_TIMEOUT_SECONDS: ${AUTH_JWKS_TIMEOUT_SECONDS:-5}
      AUTH_JWT_REQUIRE_JTI: ${AUTH_JWT_REQUIRE_JTI:-false}
      AUTH_OIDC_JWKS_URL: ${AUTH_OIDC_JWKS_URL:-}
      AUTH_OIDC_ISSUER: ${AUTH_OIDC_ISSUER:-}
      AUTH_OIDC_AUDIENCE: ${AUTH_OIDC_AUDIENCE:-}
      AUTH_OIDC_TIMEOUT_SECONDS: ${AUTH_OIDC_TIMEOUT_SECONDS:-5}
      AUTH_OIDC_MAX_AGE_SECONDS: ${AUTH_OIDC_MAX_AGE_SECONDS:-3600}
      AUTH_LOGIN_CLIENT_RATE_LIMIT_COUNT: ${AUTH_LOGIN_CLIENT_RATE_LIMIT_COUNT:-30}
      AUTH_LOGIN_CLIENT_RATE_LIMIT_WINDOW_SECONDS: ${AUTH_LOGIN_CLIENT_RATE_LIMIT_WINDOW_SECONDS:-60}
      AUTH_LOGOUT_CLIENT_RATE_LIMIT_COUNT: ${AUTH_LOGOUT_CLIENT_RATE_LIMIT_COUNT:-120}
      AUTH_LOGOUT_CLIENT_RATE_LIMIT_WINDOW_SECONDS: ${AUTH_LOGOUT_CLIENT_RATE_LIMIT_WINDOW_SECONDS:-60}
      GEMMA4_PARSER_URL: ${GEMMA4_PARSER_URL:-}
      GEMMA4_MODEL_ID: ${GEMMA4_MODEL_ID:-gemma-4-e2b-local-pending}
      GEMMA4_TIMEOUT_SECONDS: ${GEMMA4_TIMEOUT_SECONDS:-60}
      LOCAL_LLM_PARSER_URL: ${LOCAL_LLM_PARSER_URL:-http://ollama:11434/v1/chat/completions}
      OLLAMA_CHAT_URL: ${OLLAMA_CHAT_URL:-http://ollama:11434/api/chat}
      LOCAL_LLM_KEEP_ALIVE: ${LOCAL_LLM_KEEP_ALIVE:-30m}
      LOCAL_LLM_MAX_TOKENS: ${LOCAL_LLM_MAX_TOKENS:-960}
      LOCAL_LLM_TIMEOUT_SECONDS: ${LOCAL_LLM_TIMEOUT_SECONDS:-120}
      LOCAL_LLM_REPAIR_FALLBACK_ENABLED: ${LOCAL_LLM_REPAIR_FALLBACK_ENABLED:-false}
      OLLAMA_QWEN25_MODEL_ID: ${OLLAMA_QWEN25_MODEL_ID:-qwen2.5:1.5b}
      OLLAMA_GEMMA3_MODEL_ID: ${OLLAMA_GEMMA3_MODEL_ID:-gemma3:1b}
      OLLAMA_LLAMA32_MODEL_ID: ${OLLAMA_LLAMA32_MODEL_ID:-llama3.2:1b}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - ./backend/pyproject.toml:/app/pyproject.toml
    depends_on:
      db:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  web:
    build:
      context: ./web
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      VITE_ENABLE_DEBUG_TOOLS: ${VITE_ENABLE_DEBUG_TOOLS:-false}
      VITE_VOICE_PLAN: ${VITE_VOICE_PLAN:-trial}
      VITE_TRIAL_DAILY_VOICE_SECONDS: ${VITE_TRIAL_DAILY_VOICE_SECONDS:-300}
      VITE_PAID_DAILY_VOICE_SECONDS: ${VITE_PAID_DAILY_VOICE_SECONDS:-600}
      VITE_SINGLE_RECORDING_LIMIT_SECONDS: ${VITE_SINGLE_RECORDING_LIMIT_SECONDS:-60}
      VITE_VOICE_QUOTA_WARNING_SECONDS: ${VITE_VOICE_QUOTA_WARNING_SECONDS:-120}
      VITE_SILENT_AUDIO_MIN_BYTES: ${VITE_SILENT_AUDIO_MIN_BYTES:-1024}
    ports:
      - "5173:5173"
    volumes:
      - ./web/src:/app/src
      - ./web/eslint.config.js:/app/eslint.config.js
      - ./web/index.html:/app/index.html
      - ./web/tsconfig.json:/app/tsconfig.json
      - ./web/vite.config.ts:/app/vite.config.ts
    depends_on:
      - backend

volumes:
  postgres_data:
  ollama_data:
